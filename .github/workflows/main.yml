# TODO: When ubuntu-26.04 is valid on github, use gcc as the default compiler
# and remove the extra clang installs for anything but clang_unit_tests
name: main
on:
  pull_request:
    branches: [ main ]
jobs:
  pre_commit_run:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - run: sudo apt-get install ninja-build clang-19
      - run: ./run.py
        env:
          CXX: clang++-19
      - uses: pre-commit/action@v3.0.0
  gcc_unit_tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: ./run.py test
        env:
          CXX: /usr/bin/g++
  clang_unit_tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install clang-19
      - run: ./run.py test
        env:
          CXX: clang++-19
  integration_tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: ./run.py test -I
        env:
          PYTEST_ADDOPTS: "--color=yes"
